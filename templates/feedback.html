<h2>Registrar Partida</h2>

<form method="POST">
  <label>Adversário:</label>
  <input type="text" name="opponent"><br>

  <label>Placar:</label>
  <input type="text" name="score"><br>

  <label>Forehand:</label>
  <select name="forehand">
    <option>Ruim</option>
    <option>Médio</option>
    <option>Bom</option>
  </select><br>

  <label>Backhand:</label>
  <select name="backhand">
    <option>Ruim</option>
    <option>Médio</option>
    <option>Bom</option>
  </select><br>

  <label>Saque:</label>
  <select name="serve">
    <option>Ruim</option>
    <option>Médio</option>
    <option>Bom</option>
  </select><br>

  <label>Descrição:</label><br>
  <textarea name="notes"></textarea><br>

  <button type="submit">Salvar</button>
</form>
