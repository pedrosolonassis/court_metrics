<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Court Metrics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .auth-card h1 { color: #002855; margin-top: 0; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .form-control:focus { border-color: #002855; }
        .btn-auth { background: #10b981; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-auth:hover { background: #059669; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>🎾 Comece a Evoluir</h1>
        <p style="color: #64748b; margin-bottom: 25px;">Crie sua conta gratuita no Tracker Pro.</p>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Escolha um Nome de Usuário" required>
            <input type="password" name="password" class="form-control" placeholder="Crie uma Senha Segura" required>
            <button type="submit" class="btn-auth">Cadastrar</button>
        </form>
        <p style="margin-top: 20px; font-size: 13px; color: #64748b;">Já tem uma conta? <a href="/login" style="color: #002855; font-weight: bold;">Faça Login</a></p>
    </div>
</body>
</html>
