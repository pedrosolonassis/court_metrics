<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Court Metrics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; box-sizing: border-box; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .auth-card h1 { color: #002855; margin-top: 0; font-size: 24px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #0f172a; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; outline: none; font-family: inherit; font-size: 14px; transition: 0.2s; }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
        .form-control::placeholder { color: #94a3b8; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-auth { background: #10b981; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        .btn-auth:hover { background: #059669; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>🎾 Comece a Evoluir</h1>
        <p style="color: #64748b; margin-bottom: 25px; font-size: 14px;">Crie sua conta gratuita no Court Metrics.</p>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Nome de Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Seu @ de atleta" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Nome</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Informe seu nome" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Sobrenome</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Informe seu sobrenome" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">E-Mail</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Data de Nascimento</label>
                <input type="date" name="birth_date" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Mínimo de 6 caracteres" minlength="6" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirme a Senha</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repita sua senha para validarmos" minlength="6" required>
            </div>

            <button type="submit" class="btn-auth">Cadastrar</button>
        </form>
        <p style="margin-top: 20px; font-size: 13px; color: #64748b;">Já tem uma conta? <a href="/login" style="color: #0ea5e9; font-weight: bold; text-decoration: none;">Faça Login</a></p>
    </div>
</body>
</html>
